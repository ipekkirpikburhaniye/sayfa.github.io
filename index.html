<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İpek Kirpik Stüdyosu | Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
    font-family:Arial;
    background:#ffffff;
    color:#ff2ca8;
}

/* LOADING */
#loader{
    position:fixed;
    width:100%;
    height:100%;
    background:#fff;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:9999;
}
#loader img{
    width:120px;
    border-radius:15px;
    animation:logoAnim 1.5s infinite alternate;
}
@keyframes logoAnim{
    from{transform:scale(1);box-shadow:0 0 10px #ff2ca8}
    to{transform:scale(1.1);box-shadow:0 0 40px #ff2ca8}
}
#loader p{
    margin-top:10px;
    font-weight:bold;
}

/* ANİMASYON */
.fade{
    opacity:0;
    transform:translateY(30px);
    transition:all 0.8s ease;
}
.fade.show{
    opacity:1;
    transform:translateY(0);
}

/* HEADER */
header{
    text-align:center;
    padding:20px;
    border-bottom:1px solid #eee;
}
header img{
    width:120px;
    border-radius:15px;
    margin-bottom:10px;
    animation:logoGlow 2s infinite alternate;
}
@keyframes logoGlow{
    from{box-shadow:0 0 10px #ff2ca8}
    to{box-shadow:0 0 30px #ff2ca8,0 0 60px #ff2ca8}
}

header h1{
    text-shadow:0 0 10px #ff2ca8;
}

/* NAV */
nav{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    flex-wrap:wrap;
}
nav a{
    text-decoration:none;
    font-weight:bold;
    text-shadow:0 0 5px #ff2ca8;
}

/* HERO */
.hero{
    text-align:center;
    padding:60px 20px;
}
.hero h2{
    text-shadow:0 0 10px #ff2ca8;
}

/* BUTTONS */
.buttons{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    flex-wrap:wrap;
    margin-top:20px;
}

.btn{
    padding:12px 22px;
    border-radius:25px;
    text-decoration:none;
    color:#fff;
    background:#ff2ca8;
    box-shadow:0 0 10px #ff2ca8,0 0 20px #ff2ca8;
    transition:0.3s;
}
.btn:hover{
    transform:scale(1.08);
}

/* RANDEVU TITREŞİM */
.randevu{
    font-weight:bold;
    animation:vibrate 0.6s infinite;
}
@keyframes vibrate{
    0%{transform:translate(0)}
    25%{transform:translate(2px,-2px)}
    50%{transform:translate(-2px,2px)}
    75%{transform:translate(2px,2px)}
    100%{transform:translate(0)}
}

/* GRID */
.grid{
    display:grid;
    gap:15px;
    padding:20px;
}
.card{
    background:#fff;
    padding:20px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    border:1px solid #ffe0f3;
    text-shadow:0 0 5px #ff2ca8;
}

/* GALERİ */
.gallery{
    display:flex;
    overflow-x:auto;
    gap:10px;
    padding:20px;
    scroll-snap-type:x mandatory;
}
.gallery img{
    min-width:80%;
    height:220px;
    object-fit:cover;
    border-radius:12px;
    cursor:pointer;
    scroll-snap-align:center;
}

@media(min-width:768px){
.gallery{
    display:grid;
    grid-template-columns:repeat(4,1fr);
}
.gallery img{min-width:100%}
.grid{grid-template-columns:repeat(4,1fr)}
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}
.modal img{
    max-width:90%;
    max-height:90%;
}

/* FLOAT */
.float{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#ff2ca8;
    padding:15px;
    border-radius:50%;
}

/* HIDE LOADER */
.hide{
    opacity:0;
    pointer-events:none;
    transition:0.5s;
}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loader">
<img src="logo.jpg">
<p>Yükleniyor...</p>
</div>

<header class="fade">
<img src="logo.jpg">
<h1>İpek Kirpik Stüdyosu</h1>
</header>

<nav class="fade">
<a href="#">Ana Sayfa</a>
<a href="#hizmet">Hizmet</a>
<a href="#galeri">Galeri</a>
<a href="#iletisim">İletişim</a>
</nav>

<section class="hero fade">
<h2>Kusursuz Bakışlar ✨</h2>

<div class="buttons">
<a href="https://wa.me/905378509828" class="btn">WhatsApp</a>

<a href="https://wa.me/905378509828?text=Merhaba%20randevu%20almak%20istiyorum" class="btn randevu">
Hemen Randevu Al
</a>

<a href="https://www.instagram.com/ipekkirpik_burhaniye" class="btn">Instagram</a>
</div>
</section>

<section id="hizmet" class="grid fade">
<div class="card">Klasik Kirpik</div>
<div class="card">Volume</div>
<div class="card">Mega Volume</div>
<div class="card">Kirpik Lifting</div>
</section>

<section id="galeri" class="fade">
<h2 style="text-align:center;margin-top:20px;text-shadow:0 0 10px #ff2ca8">
Çalışmalar
</h2>

<div class="gallery">
<img src="1.jpg" onclick="openImg(this.src)">
<img src="2.jpg" onclick="openImg(this.src)">
<img src="3.jpg" onclick="openImg(this.src)">
<img src="4.jpg" onclick="openImg(this.src)">
<img src="5.jpg" onclick="openImg(this.src)">
<img src="6.jpg" onclick="openImg(this.src)">
<img src="7.jpg" onclick="openImg(this.src)">
<img src="8.jpg" onclick="openImg(this.src)">
</div>
</section>

<section id="iletisim" class="fade" style="text-align:center;padding:20px">
<p style="text-shadow:0 0 5px #ff2ca8">📞 0537 850 98 28</p>
</section>

<div class="modal" id="modal" onclick="closeImg()">
<img id="modalImg">
</div>

<a class="float" href="https://wa.me/905378509828">💬</a>

<script>
/* LOADING */
window.addEventListener("load", ()=>{
setTimeout(()=>{
document.getElementById("loader").classList.add("hide");
},1000);
});

/* MODAL */
function openImg(src){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=src;
}
function closeImg(){
document.getElementById("modal").style.display="none";
}

/* SCROLL */
const faders=document.querySelectorAll('.fade');

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add('show');
}
});
},{threshold:0.2});

faders.forEach(el=>observer.observe(el));
</script>

</body>
</html>
