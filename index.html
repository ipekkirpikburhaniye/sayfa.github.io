<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İpek Kirpik Stüdyosu | Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#0b0b0b;color:#fff}

/* HEADER */
header{text-align:center;padding:20px;background:#000}
header h1{color:#ff4ecd}

/* NAV */
nav{display:flex;justify-content:center;gap:10px;padding:10px;background:#111;flex-wrap:wrap}
nav a{color:#ccc;text-decoration:none}

/* HERO */
.hero{text-align:center;padding:60px 20px}
.btn{display:inline-block;margin:10px;padding:12px 20px;border-radius:25px;text-decoration:none;color:#fff}
.whatsapp{background:#25D366}
.insta{background:#E1306C}

/* SLIDER */
.slider{overflow:hidden;position:relative}
.slides{display:flex;transition:0.5s}
.slides img{width:100%;height:260px;object-fit:cover}

/* GRID */
.grid{display:grid;gap:15px;padding:20px}
.card{background:#111;padding:20px;border-radius:12px;text-align:center;border:1px solid #222}

/* GALERİ */
.gallery{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:20px;
}
.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
cursor:pointer;
}

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
z-index:999;
}
.modal img{max-width:90%;max-height:90%}

/* VIDEO */
.video{padding:20px;text-align:center}
.video iframe{
width:100%;
height:400px;
border:none;
border-radius:15px;
}

/* FLOAT */
.float{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
}

/* DESKTOP */
@media(min-width:768px){
.gallery{grid-template-columns:repeat(4,1fr)}
.grid{grid-template-columns:repeat(4,1fr)}
.video iframe{height:500px}
}
</style>
</head>

<body>

<header>
<h1>İpek Kirpik Stüdyosu</h1>
</header>

<nav>
<a href="#">Ana Sayfa</a>
<a href="#hizmet">Hizmet</a>
<a href="#galeri">Galeri</a>
<a href="#video">Video</a>
<a href="#iletisim">İletişim</a>
</nav>

<section class="hero">
<h2>Kusursuz Bakışlar ✨</h2>
<a href="https://wa.me/905378509828" class="btn whatsapp">WhatsApp</a>
<a href="https://www.instagram.com/ipekkirpik_burhaniye" class="btn insta">Instagram</a>
</section>

<!-- SLIDER -->
<div class="slider" id="slider">
<div class="slides" id="slides">
<img src="1.jpg">
<img src="2.jpg">
<img src="3.jpg">
<img src="4.jpg">
</div>
</div>

<!-- HİZMET -->
<section id="hizmet" class="grid">
<div class="card">Klasik Kirpik</div>
<div class="card">Volume</div>
<div class="card">Mega Volume</div>
<div class="card">Kirpik Lifting</div>
</section>

<!-- GALERİ -->
<section id="galeri">
<h2 style="text-align:center;color:#ff4ecd">Çalışmalar</h2>

<div class="gallery">
<img src="1.jpg" onclick="openImg(this.src)">
<img src="2.jpg" onclick="openImg(this.src)">
<img src="3.jpg" onclick="openImg(this.src)">
<img src="4.jpg" onclick="openImg(this.src)">
<img src="5.jpg" onclick="openImg(this.src)">
<img src="6.jpg" onclick="openImg(this.src)">
<img src="7.jpg" onclick="openImg(this.src)">
<img src="8.jpg" onclick="openImg(this.src)">
</div>
</section>

<!-- VIDEO -->
<section id="video" class="video">
<h2 style="color:#ff4ecd">Çalışma Videosu</h2>
<iframe src="https://www.instagram.com/reel/DXFUFjfDrur/embed"></iframe>
</section>

<!-- İLETİŞİM -->
<section id="iletisim" style="text-align:center;padding:20px">
<p>📞 0537 850 98 28</p>
</section>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeImg()">
<img id="modalImg">
</div>

<a class="float" href="https://wa.me/905378509828">💬</a>

<script>
let index=0;
let slides=document.getElementById("slides");
let total=4;

/* AUTO SLIDE */
setInterval(()=>{
index=(index+1)%total;
slides.style.transform="translateX(-"+index*100+"%)";
},3000);

/* SWIPE */
let startX=0;
document.getElementById("slider").addEventListener("touchstart",e=>{
startX=e.touches[0].clientX;
});
document.getElementById("slider").addEventListener("touchend",e=>{
let endX=e.changedTouches[0].clientX;
if(startX-endX>50){ index=(index+1)%total; }
if(endX-startX>50){ index=(index-1+total)%total; }
slides.style.transform="translateX(-"+index*100+"%)";
});

/* MODAL */
function openImg(src){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=src;
}
function closeImg(){
document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
