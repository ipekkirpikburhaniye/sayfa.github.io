<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>İpek Kirpik Stüdyosu | Premium</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    font-family:Arial;
    background:#ffffff;
    color:#ff2ca8;
}

/* HEADER */
header{
    text-align:center;
    padding:20px;
    background:#fff;
    border-bottom:1px solid #eee;
}
header h1{
    color:#ff2ca8;
    text-shadow:0 0 10px #ff2ca8;
}

/* NAV */
nav{
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    flex-wrap:wrap;
}
nav a{
    color:#ff2ca8;
    text-decoration:none;
    font-weight:bold;
}

/* HERO */
.hero{
    text-align:center;
    padding:60px 20px;
}
.btn{
    display:inline-block;
    margin:10px;
    padding:12px 22px;
    border-radius:25px;
    text-decoration:none;
    color:#fff;
}
.whatsapp{background:#25D366}
.insta{background:#E1306C}

/* 🔥 ULTRA RANDEVU BUTONU */
.randevu{
    background:#ff2ca8;
    font-weight:bold;
    box-shadow:0 0 10px #ff2ca8, 0 0 20px #ff2ca8;
    animation:parla 1.5s infinite alternate;
    transition:0.3s;
}
.randevu:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #ff2ca8, 0 0 40px #ff2ca8;
}

/* animasyon */
@keyframes parla{
    from{box-shadow:0 0 5px #ff2ca8}
    to{box-shadow:0 0 25px #ff2ca8}
}

/* GRID */
.grid{
    display:grid;
    gap:15px;
    padding:20px;
}
.card{
    background:#fff;
    padding:20px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    border:1px solid #ffe0f3;
}

/* GALERİ */
.gallery{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    padding:20px;
}
.gallery img{
    width:100%;
    height:200px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
}

/* MODAL */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.9);
    justify-content:center;
    align-items:center;
}
.modal img{
    max-width:90%;
    max-height:90%;
    border-radius:10px;
}

/* FLOAT */
.float{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    padding:15px;
    border-radius:50%;
}

/* DESKTOP */
@media(min-width:768px){
.gallery{grid-template-columns:repeat(4,1fr)}
.grid{grid-template-columns:repeat(4,1fr)}
}
</style>
</head>

<body>

<header>
<h1>İpek Kirpik Stüdyosu</h1>
</header>

<nav>
<a href="#">Ana Sayfa</a>
<a href="#hizmet">Hizmet</a>
<a href="#galeri">Galeri</a>
<a href="#iletisim">İletişim</a>
</nav>

<section class="hero">
<h2>Kusursuz Bakışlar ✨</h2>

<a href="https://wa.me/905378509828" class="btn whatsapp">WhatsApp</a>
<a href="https://www.instagram.com/ipekkirpik_burhaniye" class="btn insta">Instagram</a>

<!-- 🔥 GELİŞMİŞ RANDEVU BUTONU -->
<a href="https://wa.me/905378509828?text=Merhaba%20randevu%20almak%20istiyorum" class="btn randevu">
Hemen Randevu Al
</a>

</section>

<!-- HİZMET -->
<section id="hizmet" class="grid">
<div class="card">Klasik Kirpik</div>
<div class="card">Volume</div>
<div class="card">Mega Volume</div>
<div class="card">Kirpik Lifting</div>
</section>

<!-- GALERİ -->
<section id="galeri">
<h2 style="text-align:center;color:#ff2ca8;margin-top:20px">Çalışmalar</h2>

<div class="gallery">
<img src="1.jpg" onclick="openImg(this.src)">
<img src="2.jpg" onclick="openImg(this.src)">
<img src="3.jpg" onclick="openImg(this.src)">
<img src="4.jpg" onclick="openImg(this.src)">
<img src="5.jpg" onclick="openImg(this.src)">
<img src="6.jpg" onclick="openImg(this.src)">
<img src="7.jpg" onclick="openImg(this.src)">
<img src="8.jpg" onclick="openImg(this.src)">
</div>
</section>

<!-- İLETİŞİM -->
<section id="iletisim" style="text-align:center;padding:20px">
<p>📞 0537 850 98 28</p>
</section>

<!-- MODAL -->
<div class="modal" id="modal" onclick="closeImg()">
<img id="modalImg">
</div>

<a class="float" href="https://wa.me/905378509828">💬</a>

<script>
function openImg(src){
document.getElementById("modal").style.display="flex";
document.getElementById("modalImg").src=src;
}
function closeImg(){
document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
